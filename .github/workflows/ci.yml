name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: historytimeline
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # ubuntu-latest ships with Docker, which Testcontainers needs to
      # start the throwaway PostGIS database for the integration tests.
      - name: Build and run tests
        run: ./mvnw --batch-mode verify

  lint:
    name: Lint (Checkstyle)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: historytimeline
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Checkstyle
        run: ./mvnw --batch-mode checkstyle:check
