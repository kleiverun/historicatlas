name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: historytimeline
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # ubuntu-latest ships with Docker, which Testcontainers needs to
      # start the throwaway PostGIS database for the integration tests.
      - name: Build and run tests
        run: ./mvnw --batch-mode verify

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'

      # Node's built-in test runner discovers *.test.js -- no npm
      # install needed.
      - name: Run unit tests
        run: node --test

  lint:
    name: Lint (Checkstyle)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: historytimeline
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Checkstyle
        run: ./mvnw --batch-mode checkstyle:check
