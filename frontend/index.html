<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Historical Atlas</title>
  <link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
  <style>
    :root {
      --paper: #faf7f1;
      --ink: #3d3428;
      --ink-soft: #7a6d5c;
      --rule: #e0d8ca;
    }
    body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: var(--ink); }
    #map { position: absolute; top: 0; bottom: 64px; width: 100%; }
    #controls { position: absolute; bottom: 0; height: 64px; width: 100%;
                display: flex; align-items: center; gap: 20px;
                padding: 0 24px; box-sizing: border-box;
                background: var(--paper); border-top: 1px solid var(--rule);
                box-shadow: 0 -2px 8px rgba(61, 52, 40, 0.06); }
    #title { font-family: Georgia, "Times New Roman", serif;
             font-size: 15px; letter-spacing: 0.14em; text-transform: uppercase;
             color: var(--ink-soft); white-space: nowrap; }
    #play { width: 36px; height: 36px; flex-shrink: 0;
            border: 1px solid var(--rule); border-radius: 50%;
            background: transparent; color: var(--ink-soft);
            font-size: 13px; line-height: 1; cursor: pointer; }
    #play:hover { background: var(--rule); color: var(--ink); }
    #slider { flex: 1; accent-color: #8a7862; }
    #year { min-width: 72px; text-align: right;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 26px; font-weight: bold;
            font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="controls">
    <span id="title">Historical Atlas</span>
    <button id="play" aria-label="Play">&#9654;</button>
    <input type="range" id="slider" min="1886" max="2019" value="1910" step="1">
    <span id="year">1910</span>
  </div>

  <script>
    const API_BASE = "http://localhost:8080/api/v1";

    // Shown while the very first request is still in flight.
    const EMPTY = { type: "FeatureCollection", features: [] };

    // Muted pastels in the style of a classic political atlas. Each
    // country gets a stable color from its name (hash below), so a
    // country keeps its color as the year slider moves.
    const PALETTE = [
      "#f4d7a1", "#e9b7a8", "#cfd9a8", "#b8d0c8",
      "#d9c4dd", "#f0c199", "#c8cfe3", "#e3d3b1"
    ];

    function colorFor(name) {
      let hash = 0;
      for (let i = 0; i < name.length; i++) {
        hash = (hash * 31 + name.charCodeAt(i)) | 0;
      }
      return PALETTE[Math.abs(hash) % PALETTE.length];
    }

    const slider = document.getElementById("slider");
    const yearLabel = document.getElementById("year");

    // No basemap tiles -- see PROJECT.md section 5 for why. The
    // background layer is just an ocean color; the country polygons
    // themselves are the entire map.
    const map = new maplibregl.Map({
      container: "map",
      center: [10, 50],
      zoom: 3,
      style: {
        version: 8,
        projection: { type: "globe" },
        // Symbol layers (the country name labels) need a glyph server
        // to rasterize text from; OpenFreeMap hosts the Noto fonts.
        glyphs: "https://tiles.openfreemap.org/fonts/{fontstack}/{range}.pbf",
        sources: {},
        layers: [
          { id: "ocean", type: "background", paint: { "background-color": "#a5c3da" } }
        ]
      }
    });

    // MapLibre needs the map to finish initializing before you can add
    // sources or layers to it -- "load" fires once that's done.
    map.on("load", () => {
      // Permanent background layer: the union of every border that has
      // EVER existed in the dataset, regardless of year. Without this,
      // land that hasn't been formalized as a state YET (e.g. much of
      // Africa before the 1890s) is indistinguishable from open ocean --
      // both are just the background color. This is still "the polygons
      // are the map", not an external basemap: it's derived from the
      // exact same CShapes data, just unioned across all time instead of
      // filtered to one date.
      map.addSource("landmass", { type: "geojson", data: "landmass.geojson" });
      map.addLayer({
        id: "landmass-fill",
        type: "fill",
        source: "landmass",
        paint: { "fill-color": "#d8d2c4" }
      });

      map.addSource("borders", { type: "geojson", data: EMPTY });
      map.addSource("labels", { type: "geojson", data: EMPTY });

      map.addLayer({
        id: "borders-fill",
        type: "fill",
        source: "borders",
        paint: { "fill-color": ["get", "fill"] }
      });

      map.addLayer({
        id: "borders-line",
        type: "line",
        source: "borders",
        paint: {
          "line-color": "#7d6b55",
          "line-width": ["interpolate", ["linear"], ["zoom"], 2, 0.5, 6, 1.2]
        }
      });

      // One label point per country (computed in labelPoints below)
      // rather than a symbol layer on the polygons themselves: MapLibre
      // tiles GeoJSON sources internally, so large polygons would get
      // one label per tile they cross.
      map.addLayer({
        id: "country-labels",
        type: "symbol",
        source: "labels",
        layout: {
          "text-field": ["get", "name"],
          "text-font": ["Noto Sans Regular"],
          "text-transform": "uppercase",
          "text-letter-spacing": 0.12,
          // labelSize encodes country area, so big countries get big
          // labels; zoom scales the whole range up as you approach.
          "text-size": ["interpolate", ["linear"], ["zoom"],
            2, ["*", ["get", "labelSize"], 0.8],
            7, ["*", ["get", "labelSize"], 1.6]
          ]
        },
        paint: {
          "text-color": "#4a3f30",
          "text-halo-color": "rgba(250, 247, 241, 0.85)",
          "text-halo-width": 1.4
        }
      });

      loadYear(slider.value);
    });

    // Shoelace formula; degrees squared, only used to compare rings and
    // rank countries by size, so the unit never matters.
    function ringArea(ring) {
      let sum = 0;
      for (let i = 0; i < ring.length - 1; i++) {
        sum += ring[i][0] * ring[i + 1][1] - ring[i + 1][0] * ring[i][1];
      }
      return sum / 2;
    }

    function ringCentroid(ring) {
      const area = ringArea(ring);
      let cx = 0, cy = 0;
      for (let i = 0; i < ring.length - 1; i++) {
        const cross = ring[i][0] * ring[i + 1][1] - ring[i + 1][0] * ring[i][1];
        cx += (ring[i][0] + ring[i + 1][0]) * cross;
        cy += (ring[i][1] + ring[i + 1][1]) * cross;
      }
      return [cx / (6 * area), cy / (6 * area)];
    }

    // One point feature per country: the centroid of its largest
    // polygon (mainland, not overseas islands), plus a base text size
    // derived from area so Russia isn't labelled as small as Andorra.
    function labelPoints(geoJson) {
      const features = geoJson.features.map((feature) => {
        const polygons = feature.geometry.type === "Polygon"
          ? [feature.geometry.coordinates]
          : feature.geometry.coordinates;

        let largest = null;
        let largestArea = -1;
        for (const polygon of polygons) {
          const area = Math.abs(ringArea(polygon[0]));
          if (area > largestArea) {
            largestArea = area;
            largest = polygon[0];
          }
        }

        const magnitude = Math.log10(Math.max(largestArea, 1e-4));
        const labelSize = Math.min(17, Math.max(8, 10 + 1.6 * (magnitude + 2)));

        return {
          type: "Feature",
          geometry: { type: "Point", coordinates: ringCentroid(largest) },
          properties: { name: feature.properties.name, labelSize }
        };
      });
      return { type: "FeatureCollection", features };
    }

    // Debounce: without this, dragging the slider fires one HTTP request
    // per pixel moved. "pending" holds the scheduled call so we can
    // cancel it every time the slider moves again, and only the LAST
    // one -- 120ms after the user stops dragging -- actually runs.
    let pending;
    slider.addEventListener("input", () => {
      stopPlayback(); // grabbing the slider takes over from autoplay
      yearLabel.textContent = slider.value;
      clearTimeout(pending);
      pending = setTimeout(() => loadYear(slider.value), 120);
    });

    // Autoplay: one year every 300ms until the end of the dataset.
    // Stopped by the button, by dragging the slider, or by running out
    // of years.
    const playButton = document.getElementById("play");
    let playTimer = null;

    function stopPlayback() {
      clearInterval(playTimer);
      playTimer = null;
      playButton.innerHTML = "&#9654;";
      playButton.setAttribute("aria-label", "Play");
    }

    function startPlayback() {
      if (Number(slider.value) >= Number(slider.max)) {
        slider.value = slider.min; // at the end: restart from the top
      }
      playTimer = setInterval(() => {
        const next = Number(slider.value) + 1;
        if (next > Number(slider.max)) {
          stopPlayback();
          return;
        }
        slider.value = next;
        yearLabel.textContent = next;
        loadYear(next);
      }, 300);
      playButton.innerHTML = "&#10074;&#10074;";
      playButton.setAttribute("aria-label", "Pause");
    }

    playButton.addEventListener("click", () => {
      if (playTimer) {
        stopPlayback();
      } else {
        startPlayback();
      }
    });

    async function loadYear(year) {
      const zoom = Math.round(map.getZoom());
      const url = `${API_BASE}/borders?date=${year}-01-01&zoom=${zoom}`;

      try {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }
        const geoJson = await response.json();
        for (const feature of geoJson.features) {
          feature.properties.fill = colorFor(feature.properties.name);
        }
        map.getSource("borders").setData(geoJson);
        map.getSource("labels").setData(labelPoints(geoJson));
      } catch (error) {
        console.error("Could not load borders:", error);
      }
    }
  </script>
</body>
</html>
