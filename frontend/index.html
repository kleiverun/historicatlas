<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Historical Atlas</title>
  <link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
  <style>
    :root {
      --paper: #faf7f1;
      --ink: #3d3428;
      --ink-soft: #7a6d5c;
      --rule: #e0d8ca;
    }
    body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: var(--ink); }
    #map { position: absolute; top: 0; bottom: 64px; width: 100%; }
    #controls { position: absolute; bottom: 0; height: 64px; width: 100%;
                display: flex; align-items: center; gap: 16px;
                padding: 0 24px; box-sizing: border-box;
                background: var(--paper); border-top: 1px solid var(--rule);
                box-shadow: 0 -2px 8px rgba(61, 52, 40, 0.06); }
    #title { font-family: Georgia, "Times New Roman", serif;
             font-size: 15px; letter-spacing: 0.14em; text-transform: uppercase;
             color: var(--ink-soft); white-space: nowrap; }
    #play { width: 36px; height: 36px; flex-shrink: 0;
            border: 1px solid var(--rule); border-radius: 50%;
            background: transparent; color: var(--ink-soft);
            font-size: 13px; line-height: 1; cursor: pointer; }
    #play:hover { background: var(--rule); color: var(--ink); }
    #speed { width: 40px; height: 28px; flex-shrink: 0;
             border: 1px solid var(--rule); border-radius: 14px;
             background: transparent; color: var(--ink-soft);
             font-size: 12px; cursor: pointer; }
    #speed:hover { background: var(--rule); color: var(--ink); }
    #timeline { flex: 1; position: relative; display: flex; align-items: center; }
    #slider { width: 100%; accent-color: #8a7862; }
    /* Key-year markers under the slider track; each carries the event
       in its title attribute. The 8px inset matches half the thumb
       width, so marks line up with where the thumb stops. */
    #ticks { position: absolute; left: 8px; right: 8px;
             top: calc(50% + 9px); height: 6px; }
    .tick { position: absolute; width: 2px; height: 6px;
            background: var(--ink-soft); opacity: 0.55; cursor: help; }
    #year { min-width: 72px; text-align: right;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 26px; font-weight: bold;
            font-variant-numeric: tabular-nums; }
    #search { width: 150px; padding: 6px 10px; box-sizing: border-box;
              border: 1px solid var(--rule); border-radius: 6px;
              background: #fff; color: var(--ink); font-size: 13px; }
    #search::placeholder { color: var(--ink-soft); }
    #search.not-found { border-color: #b3564a; outline-color: #b3564a; }
    #sources-link { font-size: 13px; color: var(--ink-soft);
                    text-decoration: none; white-space: nowrap; }
    #sources-link:hover { color: var(--ink); text-decoration: underline; }
    .maplibregl-popup-content { font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
                                background: var(--paper); border: 1px solid var(--rule);
                                border-radius: 6px; padding: 10px 14px;
                                box-shadow: 0 2px 10px rgba(61, 52, 40, 0.18); }
    .maplibregl-popup-tip { border-top-color: var(--paper) !important; }
    .popup-name { font-family: Georgia, "Times New Roman", serif;
                  font-size: 16px; margin-bottom: 3px; }
    .popup-meta { font-size: 12px; color: var(--ink-soft); }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="controls">
    <span id="title">Historical Atlas</span>
    <button id="play" aria-label="Play">&#9654;</button>
    <button id="speed" aria-label="Playback speed">1&times;</button>
    <div id="timeline">
      <input type="range" id="slider" min="1886" max="2019" value="1910" step="1">
      <div id="ticks"></div>
    </div>
    <span id="year">1910</span>
    <input type="search" id="search" placeholder="Find a country&hellip;">
    <a id="sources-link" href="sources.html">Sources</a>
  </div>

  <script src="atlas.js"></script>
  <script src="app.js"></script>
</body>
</html>
