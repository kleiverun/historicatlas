<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Historical Atlas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
  <style>
    :root {
      --paper: #faf7f1;
      --ink: #3d3428;
      --ink-soft: #7a6d5c;
      --rule: #e0d8ca;
    }
    body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: var(--ink); }
    #map { position: absolute; top: 0; bottom: 72px; width: 100%; }
    #controls { position: absolute; bottom: 0; height: 72px; width: 100%;
                display: flex; align-items: center; gap: 12px;
                padding: 0 20px; box-sizing: border-box;
                background: var(--paper); border-top: 1px solid var(--rule);
                box-shadow: 0 -2px 12px rgba(61, 52, 40, 0.08); }
    #title { font-family: Georgia, "Times New Roman", serif;
             font-size: 15px; letter-spacing: 0.14em; text-transform: uppercase;
             color: var(--ink-soft); white-space: nowrap; }
    .sep { width: 1px; height: 28px; background: var(--rule); flex-shrink: 0; margin: 0 4px; }
    #play { width: 36px; height: 36px; flex-shrink: 0;
            border: 1px solid var(--rule); border-radius: 50%;
            background: transparent; color: var(--ink-soft);
            font-size: 13px; line-height: 1; cursor: pointer; }
    #play:hover { background: var(--rule); color: var(--ink); }
    #speed { width: 40px; height: 28px; flex-shrink: 0;
             border: 1px solid var(--rule); border-radius: 14px;
             background: transparent; color: var(--ink-soft);
             font-size: 12px; cursor: pointer; }
    #speed:hover { background: var(--rule); color: var(--ink); }
    /* [Feature 3] year number + era caption */
    #year-block { display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; }
    #year { min-width: 62px; text-align: right;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 28px; font-weight: bold;
            font-variant-numeric: tabular-nums; }
    #era { font-size: 10px; color: var(--ink-soft); letter-spacing: 0.07em;
           text-transform: uppercase; white-space: nowrap; margin-top: 1px; }
    #timeline { flex: 1; position: relative; display: flex; align-items: center; min-width: 0; }
    #slider { width: 100%; -webkit-appearance: none; appearance: none;
              height: 3px; border-radius: 2px; outline: none; cursor: pointer;
              background: linear-gradient(to right, #8a7862 var(--pct, 18%), var(--rule) var(--pct, 18%)); }
    #slider::-webkit-slider-thumb { -webkit-appearance: none;
              width: 14px; height: 14px; border-radius: 50%; background: #8a7862;
              border: 2.5px solid var(--paper); box-shadow: 0 0 0 1.5px #8a7862;
              cursor: pointer; transition: transform .12s; }
    #slider:hover::-webkit-slider-thumb,
    #slider:active::-webkit-slider-thumb { transform: scale(1.3); }
    #slider::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%;
              background: #8a7862; border: 2.5px solid var(--paper);
              box-shadow: 0 0 0 1.5px #8a7862; cursor: pointer; }
    #slider::-moz-range-track { height: 3px; background: var(--rule); border-radius: 2px; border: none; }
    #slider::-moz-range-progress { height: 3px; background: #8a7862; border-radius: 2px; }
    /* Key-year markers under the slider track; each carries the event
       in its title attribute. The 7px inset aligns marks with the thumb. */
    #ticks { position: absolute; left: 7px; right: 7px;
             top: calc(50% + 9px); height: 6px; }
    .tick { position: absolute; width: 2px; height: 8px;
            background: var(--ink-soft); opacity: 0.55; cursor: help; }
    /* [Feature 4] callout label above tick on hover */
    .tick::after { content: attr(data-label); position: absolute;
      bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
      background: var(--ink); color: var(--paper); font-size: 11px; line-height: 1.3;
      padding: 3px 8px; border-radius: 4px; white-space: nowrap;
      opacity: 0; pointer-events: none; transition: opacity .15s; }
    .tick:hover::after { opacity: 1; }
    #search { width: 150px; padding: 6px 14px; box-sizing: border-box;
              border: 1px solid var(--rule); border-radius: 20px;
              background: #fff; color: var(--ink); font-size: 13px; }
    #search::placeholder { color: var(--ink-soft); }
    #search.not-found { border-color: #b3564a; outline-color: #b3564a; }
    #sources-link { font-size: 13px; color: var(--ink-soft);
                    text-decoration: none; white-space: nowrap; }
    #sources-link:hover { color: var(--ink); text-decoration: underline; }
    .maplibregl-popup-content { font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
                                background: var(--paper); border: 1px solid var(--rule);
                                border-radius: 6px; padding: 10px 14px;
                                box-shadow: 0 2px 10px rgba(61, 52, 40, 0.18); }
    .maplibregl-popup-tip { border-top-color: var(--paper) !important; }
    .popup-name { font-family: Georgia, "Times New Roman", serif;
                  font-size: 16px; margin-bottom: 3px; }
    .popup-meta { font-size: 12px; color: var(--ink-soft); }
    /* [Feature 9] Wikipedia link in event marker popups */
    .popup-link { display: inline-block; margin-top: 6px; font-size: 12px;
                  color: var(--ink-soft); }
    .popup-link:hover { color: var(--ink); }
    /* The year pulses gently while border data is loading. */
    #controls.loading #year { animation: loading-pulse 1s ease-in-out infinite; }
    @keyframes loading-pulse { 50% { opacity: 0.35; } }
    /* MapLibre controls (zoom buttons, attribution) in the paper theme. */
    .maplibregl-ctrl-group { background: var(--paper);
                             box-shadow: 0 1px 5px rgba(61, 52, 40, 0.2); }
    .maplibregl-ctrl-group button + button { border-top: 1px solid var(--rule); }
    .maplibregl-ctrl-attrib { background: rgba(250, 247, 241, 0.85);
                              font-size: 11px; }
    .maplibregl-ctrl-attrib a { color: var(--ink-soft); }
    /* [Feature 7] "what changed" toast above the controls bar */
    #diff-toast { position: absolute; bottom: 84px; left: 50%;
      transform: translateX(-50%); max-width: 80%; z-index: 5;
      padding: 7px 16px; background: var(--paper); border: 1px solid var(--rule);
      border-radius: 18px; font-size: 13px; color: var(--ink);
      box-shadow: 0 2px 10px rgba(61,52,40,0.15); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
      opacity: 0; pointer-events: none; transition: opacity .3s; }
    #diff-toast.visible { opacity: 1; }
    /* [Feature 8] stories button, story list panel, and step card */
    #stories-btn { height: 28px; padding: 0 12px; flex-shrink: 0;
      border: 1px solid var(--rule); border-radius: 14px;
      background: transparent; color: var(--ink-soft);
      font-size: 12px; cursor: pointer; }
    #stories-btn:hover { background: var(--rule); color: var(--ink); }
    #story-panel[hidden] { display: none; }
    #story-panel { position: absolute; bottom: 84px; right: 20px; z-index: 6;
      display: flex; flex-direction: column; gap: 6px; width: 280px;
      padding: 10px; background: var(--paper); border: 1px solid var(--rule);
      border-radius: 8px; box-shadow: 0 2px 14px rgba(61,52,40,0.18); }
    .story-item { display: flex; flex-direction: column; align-items: flex-start;
      gap: 2px; padding: 8px 10px; border: 1px solid var(--rule);
      border-radius: 6px; background: transparent; cursor: pointer;
      text-align: left; color: var(--ink); }
    .story-item:hover { background: var(--rule); }
    .story-item-title { font-family: Georgia, "Times New Roman", serif; font-size: 14px; }
    .story-item-sub { font-size: 11px; color: var(--ink-soft); }
    #story-card { position: absolute; top: 16px; left: 16px; z-index: 6;
      width: 320px; max-width: calc(100% - 32px); padding: 14px 16px;
      background: var(--paper); border: 1px solid var(--rule);
      border-radius: 8px; box-shadow: 0 2px 14px rgba(61,52,40,0.18); }
    #story-card-title { font-family: Georgia, "Times New Roman", serif;
      font-size: 15px; margin-bottom: 6px; }
    #story-card-text { font-size: 13px; line-height: 1.5; color: var(--ink); }
    #story-card-nav { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    #story-card-nav button { padding: 4px 10px; border: 1px solid var(--rule);
      border-radius: 6px; background: transparent; color: var(--ink-soft);
      font-size: 12px; cursor: pointer; }
    #story-card-nav button:hover:not(:disabled) { background: var(--rule); color: var(--ink); }
    #story-card-nav button:disabled { opacity: 0.4; cursor: default; }
    #story-progress { font-size: 11px; color: var(--ink-soft); margin-left: auto; }
    #story-exit { margin-left: 4px; }
    /* [Feature 1] floating country name tooltip on hover */
    #hover-tooltip { position: fixed; pointer-events: none; z-index: 10;
      padding: 4px 9px; background: var(--paper); border: 1px solid var(--rule);
      border-radius: 4px; font-size: 13px; white-space: nowrap; display: none;
      box-shadow: 0 1px 6px rgba(61,52,40,0.15); }
    /* Narrow screens: the map keeps its width; drop the title, shrink
       the rest. The Sources link stays -- the license requires it. */
    @media (max-width: 720px) {
      #controls { gap: 8px; padding: 0 12px; }
      .sep { margin: 0; }
      #title { display: none; }
      #search { width: 96px; }
      #year { min-width: 52px; font-size: 22px; }
      #era { font-size: 9px; } /* [Feature 3] */
      #stories-btn { display: none; } /* [Feature 8] */
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="controls">
    <span id="title">Historical Atlas</span>
    <span class="sep"></span>
    <button id="play" aria-label="Play" title="Play through the years (space)">&#9654;</button>
    <button id="speed" aria-label="Playback speed" title="Playback speed">1&times;</button>
    <div id="year-block">
      <span id="year">1910</span>
      <span id="era"></span>
    </div>
    <div id="timeline">
      <input type="range" id="slider" min="1886" max="2019" value="1910" step="1">
      <div id="ticks"></div>
    </div>
    <span class="sep"></span>
    <input type="search" id="search" placeholder="Find a country&hellip;">
    <button id="stories-btn">Stories</button> <!-- [Feature 8] -->
    <a id="sources-link" href="sources.html">Sources</a>
  </div>

  <div id="diff-toast"></div> <!-- [Feature 7] -->

  <!-- [Feature 8] story list + step card -->
  <div id="story-panel" hidden></div>
  <div id="story-card" hidden>
    <div id="story-card-title"></div>
    <div id="story-card-text"></div>
    <div id="story-card-nav">
      <button id="story-prev">&lsaquo; Back</button>
      <button id="story-next">Next &rsaquo;</button>
      <span id="story-progress"></span>
      <button id="story-exit" aria-label="Close story">&times;</button>
    </div>
  </div>

  <div id="hover-tooltip"></div> <!-- [Feature 1] -->
  <script src="atlas.js"></script>
  <script src="app.js"></script>
  <script src="stories.js"></script> <!-- [Feature 8] -->
  <script src="events.js"></script> <!-- [Feature 9] -->
</body>
</html>
